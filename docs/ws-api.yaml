# WebSocket API Contract
# Single source of truth for the Lua ↔ Python wire protocol.
#
# Wire format:  JSON envelope  {"t": "<topic>", "p": <payload>, "r": "<request_id>", "ts": <ms>}
# Transport:    WebSocket (RFC 6455)
#
# Architecture (bridge proxy):
#   Lua Game  →  talker_bridge (port 5558)  →  talker_service (port 5557)
#   All traffic flows through the bridge. The bridge proxies non-mic
#   topics transparently and handles mic/tts topics locally.
#
# Authentication:
#   Optional token auth via query parameter: ws://host:5558/ws?token=<token>
#   Tokens configured via TALKER_TOKENS env var: "name1:token1,name2:token2"
#   When TALKER_TOKENS is unset, all connections are accepted (local mode).
#
# Close codes:
#   4001 — Authentication failed (invalid or missing token when auth is required)
#   4000 — Only one connection allowed (bridge, single-client enforcement)
#   1001 — Server shutting down

version: "3.0"

envelope:
  description: >
    Every WebSocket text frame is a JSON object with the following fields.
    Both directions (client→server, server→client) use the same envelope.
  fields:
    t:  { type: string, required: true,  description: "Topic / message type" }
    p:  { type: any,    required: true,  description: "Payload (topic-specific data)" }
    r:  { type: string, required: false, description: "Request ID for request/response correlation. Echoed back in responses." }
    ts: { type: int,    required: true,  description: "Timestamp in milliseconds since epoch" }

# ──────────────────────────────────────────────────────────────
# Notes
# ──────────────────────────────────────────────────────────────
notes:
  lua_empty_tables: >
    Lua serialises empty tables {} as either JSON {} or [].
    Consumers MUST handle both representations for any field
    typed as 'object' (e.g. flags, context).
  player_id: >
    The player character always has game_id = "0".
  fire_and_forget: >
    All Lua→Python event messages are fire-and-forget.
    The game does not wait for responses. Message loss is
    acceptable.
  request_response: >
    Request/response correlation uses the 'r' field. The sender
    includes a unique request_id in the 'r' field. The responder
    echoes the same 'r' value in the response envelope. The
    WSRouter short-circuits 'r'-bearing inbound frames to resolve
    pending futures before topic-handler dispatch.
  reconnect: >
    The Lua bridge channel implements reconnection with exponential
    backoff (1s base, 30s cap, ±20% jitter). On reconnect, a
    config.sync message is automatically published.

# ──────────────────────────────────────────────────────────────
# Channels
# ──────────────────────────────────────────────────────────────
channels:
  bridge:
    description: >
      Single connection from Lua to talker_bridge (port 5558).
      The bridge proxies all non-mic topics transparently to/from
      talker_service (port 5557) and handles mic/tts topics locally.
    default_url: "ws://127.0.0.1:5558/ws"
    lua_module: "infra.bridge.channel"
    python_module: "talker_bridge/python/main.py (websockets server)"
    reconnect: true
    single_client: true
    auth: optional

  service:
    description: >
      Internal connection from talker_bridge to talker_service.
      Game code does not connect here directly; the bridge proxies traffic.
    default_url: "ws://127.0.0.1:5557/ws"
    python_module: "talker_service.transport.ws_router"
    reconnect: true
    auth: optional

# ──────────────────────────────────────────────────────────────
# Shared Types
# ──────────────────────────────────────────────────────────────
types:
  Character:
    game_id:        { type: any, required: true, description: "Unique game engine ID. Lua sends string, but int is tolerated. '0' for the player." }
    name:           { type: string, required: true }
    faction:        { type: string, default: "stalker" }
    experience:     { type: string, description: "Rank: Novice, Trainee, Experienced, Professional, Veteran, Expert, Master, Legend" }
    reputation:     { type: integer, description: "Reputation value as a numeric score." }
    weapon:         { type: string }
    visual_faction: { type: string, description: "Disguise faction if disguised, null otherwise" }
    story_id:       { type: string, description: "Story ID for notable character matching" }

  EventFlags:
    is_silent:      { type: bool, default: false,  description: "Event stored but no dialogue generated" }
    is_idle:        { type: bool, default: false,  description: "Idle conversation trigger" }
    is_compressed:  { type: bool, default: false,  description: "Synthetic compressed memory event" }
    is_synthetic:   { type: bool, default: false,  description: "Generated by the system, not the game" }

  EventContext:
    # Character references (each is a Character object when present)
    actor:          { $ref: Character, description: "Primary actor" }
    victim:         { $ref: Character }
    killer:         { $ref: Character }
    spotter:        { $ref: Character }
    target:         { $ref: Character }
    taunter:        { $ref: Character }
    speaker:        { $ref: Character }
    # Scalar fields
    text:           { type: string, description: "Dialogue text or message content" }
    item_name:      { type: string }
    item_section:   { type: string }
    action:         { type: string, description: "Context-specific action (pickup, completed, etc.)" }
    health_percent: { type: int }
    from_location:  { type: string }
    to_location:    { type: string }
    destination:    { type: string }
    source:         { type: string }
    anomaly_type:   { type: string }
    emission_type:  { type: string, enum: [emission, psi_storm] }
    status:         { type: string, enum: [starting, ending] }
    task_name:      { type: string }
    task_status:    { type: string, description: "Status of the task (completed, failed, updated, etc.)" }
    task_giver:     { $ref: Character, description: "Character who gave the task (technical faction ID, no display-name conversion)" }
    instruction:    { type: string }
    source_event:   { type: object }
    # Array fields
    companions:     { type: array, items: { $ref: Character } }

  Event:
    type:
      type: string
      required: true
      # CANONICAL SOURCE: bin/lua/domain/model/event_types.lua
      enum: [death, dialogue, callout, taunt, artifact, anomaly, map_transition, emission, injury, sleep, task, weapon_jam, reload, idle]
      description: "EventType enum value (lowercase) — 14 types total"
    context:        { $ref: EventContext }
    game_time_ms:   { type: int, description: "Game time in milliseconds" }
    world_context:  { type: string, description: "Legacy location/time description string" }
    witnesses:      { type: array, items: { $ref: Character } }
    flags:          { $ref: EventFlags, description: "May arrive as [] when empty (Lua serialisation)" }

  SceneContext:
    loc:                       { type: string, description: "Technical level name (e.g. l01_escape)" }
    poi:                       { type: string, description: "Nearby smart terrain name" }
    time:                      { type: object, description: "Object with keys Y, M, D, h, m, s, ms" }
    weather:                   { type: string }
    emission:                  { type: bool }
    psy_storm:                 { type: bool }
    sheltering:                { type: bool }
    campfire:                  { type: string, nullable: true, description: "'lit', 'unlit', or null" }
    brain_scorcher_disabled:   { type: bool }
    miracle_machine_disabled:  { type: bool }
    # Legacy fields (kept for backward compatibility)
    location:                  { type: string }
    location_technical:        { type: string }
    nearby_smart_terrain:      { type: string }
    time_of_day:               { type: string }
    game_time_ms:              { type: int }

# ──────────────────────────────────────────────────────────────
# Game Messages (proxied: Lua → bridge → talker_service)
# ──────────────────────────────────────────────────────────────
messages:

  # ── Lua → talker_service (proxied through bridge) ─────────

  game.event:
    channel: bridge
    direction: lua→bridge→service
    description: "Game events (death, dialogue, artifacts, etc.)"
    payload:
      event:        { $ref: Event, required: true }
      is_important: { type: bool, default: false }

  player.dialogue:
    channel: bridge
    direction: lua→bridge→service
    description: "Player chatbox input"
    payload:
      text:    { type: string, required: true }
      context: { type: object, description: "Optional context with speaker Character, etc." }

  player.whisper:
    channel: bridge
    direction: lua→bridge→service
    description: "Player whisper input (companion-only communication)"
    payload:
      text:   { type: string, required: true }
      target: { $ref: Character, description: "Target companion or null" }

  config.update:
    channel: bridge
    direction: lua→bridge→service
    description: "Single MCM setting changed"
    payload:
      key:   { type: string, required: true }
      value: { type: any, required: true }

  config.sync:
    channel: bridge
    direction: lua→bridge→service
    description: "Full MCM configuration on game load or reconnect"
    payload:
      config: { type: object, required: true, description: "Flat dict of all MCM settings" }

  system.heartbeat:
    channel: bridge
    direction: lua→bridge→service
    description: "Periodic connection health check"
    payload:
      game_time_ms: { type: int }
      status:       { type: string, default: "alive" }

  # ── talker_service → Lua (proxied through bridge) ─────────

  dialogue.display:
    channel: bridge
    direction: service→bridge→lua
    description: "Display NPC dialogue in-game"
    payload:
      speaker_id:    { type: string, required: true }
      dialogue:      { type: string, required: true }
      create_event:  { type: bool, default: true, description: "Whether to create a DIALOGUE event in event_store" }
      event_context: { type: object, description: "Additional context merged into the created event" }

  tts.audio:
    channel: bridge
    direction: service→bridge→lua
    description: "Play TTS audio for an NPC in-game using 3D spatial audio. Replaces dialogue.display when TTS is available."
    payload:
      speaker_id:    { type: string, required: true, description: "Character ID" }
      dialogue:      { type: string, required: true, description: "Dialogue text (included for logging/fallback)" }
      dialogue_id:   { type: int, required: true, description: "Monotonic counter for end-to-end correlation" }
      audio_b64:     { type: string, required: true, description: "Base64-encoded OGG Vorbis audio data" }
      voice_id:      { type: string, required: true, description: "Voice identifier used for TTS generation" }
      create_event:  { type: bool, default: true, description: "Whether to create a DIALOGUE event in event_store" }
      event_context: { type: object, description: "Additional context merged into the created event" }

  memory.update:
    channel: bridge
    direction: service→bridge→lua
    description: "Update a character's narrative memory"
    payload:
      character_id:       { type: string, required: true }
      narrative:          { type: string, description: "Full narrative text. If null, only timestamp is updated." }
      last_event_time_ms: { type: int, description: "Game time of last compressed event" }

  event.store:
    channel: bridge
    direction: service→bridge→lua
    description: "Store a compressed memory event (injected from Python)"
    payload:
      event: { $ref: Event, required: true }

  config.request:
    channel: bridge
    direction: service→bridge→lua
    description: "Python requests a config sync (e.g. after restart)"
    payload:
      reason: { type: string, description: "Reason for the request" }

  service.heartbeat.ack:
    channel: bridge
    direction: service→bridge→lua
    description: "Python acknowledges Lua's heartbeat"
    payload: {}

  # ── State Queries (service→bridge→lua→bridge→service) ─────

  state.query.batch:
    channel: bridge
    direction: service→bridge→lua→bridge→service
    description: >
      Batch state query — multiple sub-queries in a single roundtrip.
      Python sends with a unique 'r' field. Lua processes all sub-queries
      and responds on 'state.response' echoing the same 'r' value.
    request:
      queries:
        type: array
        required: true
        description: "Ordered list of sub-queries"
        items:
          id:       { type: string, required: true, description: "Unique sub-query identifier" }
          resource: { type: string, required: true, description: "Resource name (see resource registry below)" }
          params:   { type: object, description: "Resource-specific key-value parameters" }
          filter:   { type: object, description: "MongoDB-style filter document (see FilterDocument)" }
          sort:     { type: object, description: "Field→direction map. 1=ascending, -1=descending" }
          limit:    { type: int, description: "Maximum number of results to return" }
          fields:   { type: array, items: { type: string }, description: "Restrict returned fields" }
    response:
      results:
        type: object
        description: "Map of sub-query id → result object"
        values:
          ok:    { type: bool, description: "true on success, false on failure" }
          data:  { type: any, description: "Query result (when ok=true). Shape depends on resource." }
          error: { type: string, description: "Error message (when ok=false)" }

    resource_registry:
      store.memories:
        description: "Query character memory context"
        params:
          character_id: { type: string, required: true }
        returns: "MemoryContext object (narrative, new_events, etc.)"
      store.events:
        description: "Query event store entries"
        params:
          character_id: { type: string, required: true }
        returns: "Array of Event objects (supports filter/sort/limit)"
      store.personalities:
        description: "Query character personality text"
        params:
          character_id: { type: string, required: true }
        returns: "Personality string for the character"
      store.backstories:
        description: "Query character backstory text"
        params:
          character_id: { type: string, required: true }
        returns: "Backstory string for the character"
      store.levels:
        description: "Query compression levels for a character"
        params:
          character_id: { type: string, required: true }
        returns: "Compression level information"
      store.timers:
        description: "Query timer information for a character"
        params:
          character_id: { type: string, required: true }
        returns: "Timer data"
      query.character:
        description: "Query character information by game ID"
        params:
          id: { type: string, required: true }
        returns: "Character object"
      query.characters_nearby:
        description: "Query characters near player"
        params:
          center_id: { type: string, description: "Defaults to player" }
          radius:    { type: float, default: 50.0 }
        returns: "Array of Character objects"
      query.characters_alive:
        description: "Check alive status for story character IDs"
        params:
          ids: { type: array, items: { type: string }, required: true }
        returns: "Object mapping story_id → bool"
      query.world:
        description: "Query current world context (location, time, weather)"
        params: {}
        returns: "SceneContext object"
      query.events_recent:
        description: "Query recent events since a timestamp"
        params:
          since_ms: { type: int, default: 0 }
          limit:    { type: int, default: 50 }
        returns: "Array of Event objects"
      query.smart_terrain_population:
        description: "Query NPC count for a smart terrain"
        params:
          smart_terrain_name: { type: string, required: true }
        returns: "Object with count field"
      query.faction_goodwill:
        description: "Query faction goodwill toward another faction"
        params:
          from_faction: { type: string, required: true }
          to_faction:   { type: string, required: true }
        returns: "Object with goodwill field"
      query.player_rank:
        description: "Query player rank and reputation"
        params: {}
        returns: "Object with rank and reputation fields"

    filter_document:
      description: "MongoDB-style query filter applied to result arrays"
      operators:
        $eq:        "Exact equality"
        $ne:        "Not equal"
        $gt:        "Greater than"
        $gte:       "Greater than or equal"
        $lt:        "Less than"
        $lte:       "Less than or equal"
        $in:        "Value in array"
        $nin:       "Value not in array"
        $regex:     "Lua pattern match"
        $exists:    "Field exists (true) or is missing (false)"
        $elemMatch: "At least one array element matches sub-filter"
        $size:      "Array has exactly N elements"
        $all:       "Array contains all specified values"
        $and:       "Logical AND of sub-filters"
        $or:        "Logical OR of sub-filters"
        $not:       "Logical NOT of sub-filter"

    cross_query_references:
      description: "Sub-queries can reference results from earlier sub-queries"
      format: "$ref:<query_id>.<dotted.path>"
      example: '{"game_time_ms": {"$gt": "$ref:mem.last_update_time_ms"}}'
      constraint: "Referenced query must appear earlier in the queries array"

  # ── State Response ──────────────────────────────────────────

  state.response:
    channel: service
    direction: lua→python
    description: >
      Response to a state.query.batch. The 'r' field in the envelope
      carries the original request_id for correlation.
    payload:
      request_id:    { type: string, required: true, description: "Echoed from the original query (also in envelope.r)" }
      response_type: { type: string, description: "Query type that produced this response" }
      data:          { type: object, description: "Response payload (present on success)" }
      error:         { type: string, description: "Error message (present on failure, mutually exclusive with data)" }
      timestamp:     { type: int }

# ──────────────────────────────────────────────────────────────
# Mic & Audio Messages (handled locally by talker_bridge)
# ──────────────────────────────────────────────────────────────

  # ── Lua → talker_bridge (handled locally) ───────────────────

  mic.start:
    channel: bridge
    direction: lua→bridge
    description: "Command talker_bridge to start recording. Bridge captures audio and streams chunks to talker_service."
    payload:
      lang:   { type: string, nullable: true, description: "ISO-639-1 language code, or null for auto-detect" }
      prompt: { type: string, description: "Transcription hint (nearby NPC names, STALKER setting context)" }

  mic.stop:
    channel: bridge
    direction: lua→bridge
    description: "Command talker_bridge to cancel the current recording"
    payload: {}

  mic.cancel:
    channel: bridge
    direction: lua→bridge
    description: "Cancel current recording session (alias for mic.stop)"
    payload: {}

  # ── talker_bridge → talker_service (audio streaming) ────────

  mic.audio.chunk:
    channel: service
    direction: bridge→service
    description: "Stream a chunk of base64-encoded PCM audio from bridge to service"
    payload:
      audio_b64: { type: string, required: true, description: "Base64-encoded raw PCM int16 mono 16kHz audio chunk" }
      seq:       { type: int, required: true, description: "1-based sequence number for ordering" }

  mic.audio.end:
    channel: service
    direction: bridge→service
    description: "Signal end of audio stream. Triggers transcription in the service."
    payload:
      context:
        type: object
        description: "Recording context"
        properties:
          type: { type: string, enum: [dialogue, whisper], description: "Determines which dialogue handler receives the transcript" }

  # ── talker_service → Lua (via bridge proxy) ─────────────────

  mic.status:
    channel: bridge
    direction: service→lua
    description: "Reports the current mic/transcription phase. Proxied through bridge."
    payload:
      status: { type: string, required: true, enum: ["LISTENING", "TRANSCRIBING"], description: "Current mic phase" }

  mic.result:
    channel: bridge
    direction: service→lua
    description: "Delivers the final transcription. Session handlers auto-cleanup on receipt. Proxied through bridge."
    payload:
      text: { type: string, required: true, description: "Transcribed text. Empty string on failure." }

  # ── TTS (Lua → talker_bridge, handled locally) ──────────────

  tts.speak:
    channel: bridge
    direction: lua→bridge
    description: "Command talker_bridge to synthesise and play a TTS audio line"
    payload:
      voice_id:   { type: string, required: true, description: "Voice theme ID derived from npc:sound_prefix() (e.g. 'stalker_1', 'dolg_3')" }
      text:       { type: string, required: true, description: "Dialogue text to synthesise" }
      speaker_id: { type: string, required: true, description: "NPC game_id (echoed back in tts.started/tts.done)" }

  # ── TTS (talker_bridge → Lua) ───────────────────────────────

  tts.started:
    channel: bridge
    direction: bridge→lua
    description: "talker_bridge has begun playing the TTS audio. Lua should display HUD subtitle now."
    payload:
      speaker_id: { type: string, required: true, description: "NPC game_id, echoed from tts.speak" }

  tts.done:
    channel: bridge
    direction: bridge→lua
    description: "talker_bridge has finished playing the TTS audio. Lua dequeues item and sends the next one."
    payload:
      speaker_id: { type: string, required: true, description: "NPC game_id, echoed from tts.speak" }
