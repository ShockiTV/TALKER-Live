# Multi-branch TALKER deployment — docker-compose template
#
# Deploy multiple talker_service instances (one per git branch) behind Caddy,
# with shared TTS and STT containers.
#
# Directory layout on VPS:
#   /opt/talker-live/
#   ├── docker-compose.yml   (this file)
#   ├── Caddyfile
#   ├── .env.main
#   ├── .env.dev
#   ├── voices/              (shared .safetensors voice files)
#   ├── logs/main/
#   ├── logs/dev/
#   └── branches/
#       ├── main/            (git worktree → main branch)
#       └── dev/             (git worktree → dev branch)

services:
  # ─── Reverse Proxy ───────────────────────────
  caddy:
    # Includes caddy-security plugin for JWT authorization + claim handling.
    image: ghcr.io/greenpau/caddy-security:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - talker-main
      - talker-dev
      - keycloak
      - neo4j
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        labels: "service=caddy"

  # ─── Branch: main ────────────────────────────
  talker-main:
    build:
      context: ./branches/main/talker_service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.main
    environment:
      - WS_HOST=0.0.0.0
      - WS_PORT=5557
      - LOG_LEVEL=INFO
      - TTS_SERVICE_URL=http://tts-service:8100
      - STT_ENDPOINT=http://stt-service:8000/v1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-change-me}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    volumes:
      - ./logs/main:/app/logs
    expose:
      - "5557"
    depends_on:
      - tts-service
      - stt-service
      - neo4j
      - ollama
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        labels: "service=talker-main"

  # ─── Branch: dev ─────────────────────────────
  talker-dev:
    build:
      context: ./branches/dev/talker_service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.dev
    environment:
      - WS_HOST=0.0.0.0
      - WS_PORT=5557
      - LOG_LEVEL=INFO
      - TTS_SERVICE_URL=http://tts-service:8100
      - STT_ENDPOINT=http://stt-service:8000/v1
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-change-me}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
    volumes:
      - ./logs/dev:/app/logs
    expose:
      - "5557"
    depends_on:
      - tts-service
      - stt-service
      - neo4j
      - ollama
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        labels: "service=talker-dev"

  # ─── Graph Memory: Neo4j ────────────────────
  neo4j:
    image: neo4j:5.26-community
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/change-me}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    expose:
      - "7474"
      - "7687"
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        labels: "service=neo4j"

  # ─── Embeddings: Ollama ──────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    expose:
      - "11434"
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        labels: "service=ollama"

  # ─── Auth: Keycloak + Postgres ───────────────
  postgres-keycloak:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${KEYCLOAK_DB_NAME:-keycloak}
      - POSTGRES_USER=${KEYCLOAK_DB_USER:-keycloak}
      - POSTGRES_PASSWORD=${KEYCLOAK_DB_PASSWORD:-change-me}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        labels: "service=postgres-keycloak"

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    command: ["start"]
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres-keycloak:5432/${KEYCLOAK_DB_NAME:-keycloak}
      - KC_DB_USERNAME=${KEYCLOAK_DB_USER:-keycloak}
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD:-change-me}
      - KC_HTTP_ENABLED=true
      - KC_HTTP_RELATIVE_PATH=/auth
      - KC_PROXY_HEADERS=xforwarded
      - KC_HOSTNAME=${DOMAIN}
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-change-me}
    depends_on:
      - postgres-keycloak
    expose:
      - "8080"
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        labels: "service=keycloak"

  # ─── Shared TTS Service ─────────────────────
  tts-service:
    build:
      context: ./tts_service
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./voices:/app/voices:ro
    expose:
      - "8100"
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        labels: "service=tts"

  # ─── Shared STT Service ─────────────────────
  stt-service:
    image: fedirz/faster-whisper-server:latest-cpu
    restart: unless-stopped
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-base.en
    expose:
      - "8000"
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        labels: "service=stt"

  # ─── Logging ─────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    logging:
      driver: json-file
      options:
        max-size: "10m"

  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
      - GF_SERVER_ROOT_URL=https://${DOMAIN}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    depends_on:
      - loki
    logging:
      driver: loki
      options:
        loki-url: "http://localhost:3100/loki/api/v1/push"
        labels: "service=grafana"

volumes:
  caddy_data:
  caddy_config:
  neo4j_data:
  neo4j_logs:
  ollama_data:
  keycloak_db_data:
  loki_data:
  grafana_data:
