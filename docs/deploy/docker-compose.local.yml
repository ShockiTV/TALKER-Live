# Local override for debugging Neo4j/Ollama from host.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up

services:
  neo4j:
    ports:
      - "7474:7474"
      - "7687:7687"

  ollama:
    ports:
      - "11434:11434"

  # Disable observability stack locally unless explicitly requested.
  loki:
    profiles: ["disabled"]

  grafana:
    profiles: ["disabled"]
