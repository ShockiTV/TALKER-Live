name: spec-driven-superpowers
version: 1
description: >
  Spec-driven planning with Superpowers execution. Proposal, specs, and
  design use the standard spec-driven workflow. Tasks, apply, and verify
  delegate to installed Superpowers skills for TDD-driven implementation.

# ──────────────────────────────────────────────────────────────────────
# REQUIRED SKILLS (must be installed for this schema to work):
#
#   Superpowers plugin (obra/superpowers):
#     - superpowers:writing-plans
#     - superpowers:executing-plans
#     - superpowers:subagent-driven-development
#     - superpowers:test-driven-development
#     - superpowers:requesting-code-review
#     - superpowers:verification-before-completion
#     - superpowers:using-git-worktrees
#
#   Install via Claude Code:
#     /plugin marketplace add obra/superpowers-marketplace
#     /plugin install superpowers@superpowers-marketplace
#
# ──────────────────────────────────────────────────────────────────────

artifacts:
  - id: proposal
    generates: proposal.md
    description: Why we're making this change, what's in scope, and the approach
    template: proposal.md
    requires: []

  - id: specs
    generates: specs/**/*.md
    description: >
      Delta specs with RFC 2119 keywords (SHALL/MUST/SHOULD/MAY) and
      Given/When/Then scenarios describing required behavior changes.
    template: specs/spec.md
    requires:
      - proposal

  - id: design
    generates: design.md
    description: Technical approach, architecture decisions, and component boundaries
    template: design.md
    requires:
      - specs

  - id: tasks
    generates: tasks.md
    description: >
      Superpowers-style implementation plan generated by the writing-plans skill.
    template: superpowers-tasks.md
    instruction: |
      BEFORE generating the plan, ask the user which execution approach to use:

      **"Two execution options for this plan:**

      **1. Subagent-Driven (this session)** — Fresh subagent per task,
      automated two-stage review, fast iteration

      **2. Batch Execution (separate session)** — Batches of 3, human
      checkpoints between batches

      **Which approach?"**

      Do NOT proceed until the user has chosen. Record their choice.

      Then generate the implementation plan by invoking the Superpowers
      writing-plans skill.

      **REQUIRED SUB-SKILL:** Use superpowers:writing-plans

      Feed it the following context from this OpenSpec change:
      - design.md — the approved technical approach
      - specs/ — the delta specs with Given/When/Then scenarios
      - proposal.md — the intent and scope

      The writing-plans skill will produce bite-sized TDD tasks (2-5 min each)
      with exact file paths, complete code, and verification commands.

      IMPORTANT: After the plan is written, replace the plan header directive
      with the user's chosen approach:
      - If Subagent-Driven: `> **For Claude:** REQUIRED SUB-SKILL: Use superpowers:subagent-driven-development to implement this plan.`
      - If Batch Execution: `> **For Claude:** REQUIRED SUB-SKILL: Use superpowers:executing-plans to implement this plan task-by-task.`
      The writing-plans skill hardcodes executing-plans — you MUST override it
      to match the user's choice.

      ADDITIONAL REQUIREMENT specific to this schema: every Given/When/Then
      scenario from specs/ MUST map to at least one test case in the plan.
      Include a Spec Coverage Map table at the top of tasks.md cross-referencing
      each scenario to its task number (see superpowers-tasks.md template).

      Save the plan as tasks.md inside the OpenSpec change folder.
    requires:
      - design
      - specs

apply:
  requires:
    - tasks
  tracks: tasks.md
  instruction: |
    Execute the implementation plan using Superpowers execution skills.

    BEFORE STARTING:
    - **REQUIRED SUB-SKILL:** Use superpowers:using-git-worktrees to set up
      an isolated workspace. Never implement on main/master.
    - Read tasks.md fully and review critically.
    - Verify clean test baseline (all existing tests pass).

    EXECUTION — follow the approach specified in the tasks.md header directive:

    The plan header contains a `REQUIRED SUB-SKILL` line that was chosen by
    the user during the tasks artifact phase. Follow it exactly:

    If header says `superpowers:subagent-driven-development`:
    - **REQUIRED SUB-SKILL:** Use superpowers:subagent-driven-development
    - Dispatches fresh subagent per task with two-stage review
    - The superpowers:requesting-code-review skill handles review between tasks
    - The superpowers:test-driven-development skill enforces RED/GREEN/REFACTOR

    If header says `superpowers:executing-plans`:
    - **REQUIRED SUB-SKILL:** Use superpowers:executing-plans
    - Batch execution with human checkpoints between batches

    Mark each task checkbox [x] in tasks.md when complete.

    After ALL tasks complete:
    - **REQUIRED SUB-SKILL:** Use superpowers:verification-before-completion
    - Suggest running /opsx:verify for spec-level validation.

verify:
  instruction: |
    Validate implementation against OpenSpec change artifacts.

    First, ensure superpowers:verification-before-completion has been run
    (it should have been triggered at the end of apply). If not, invoke it now.

    Then perform OpenSpec-specific checks:

    SPEC COMPLETENESS
    - Every requirement in specs/ has corresponding implementation
    - Every Given/When/Then scenario has a passing test
    - Cross-reference the Spec Coverage Map in tasks.md

    COHERENCE
    - Design decisions from design.md are reflected in code structure
    - Naming conventions match design
    - No orphaned code or dead paths

    Report findings as: critical (must fix) / warning (should fix) / info.
    State whether the change is ready for /opsx:archive.
