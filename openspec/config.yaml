  ```instructions
  # TALKER Expanded - AI Coding Agent Instructions

  ## Project Overview

  TALKER Expanded is a STALKER: Anomaly mod that enables AI-powered NPC dialogue using LLMs. It's a dual-codebase project: Lua (game integration) + Python (AI processing & microphone input). The mod implements a hierarchical memory system where NPCs witness events, store memories, and generate contextual dialogue through AI models.

  **IMPORTANT (Phase 2+):** AI dialogue generation is handled by the Python service, NOT Lua. The game (Lua) stores events and sends them via ZeroMQ to Python, which handles LLM calls, speaker selection, and memory compression.

  ## Architecture (Clean Architecture Pattern)

  ### Lua Codebase (Game Integration)

  The Lua codebase follows clean architecture with strict layer separation:

  - **`bin/lua/app/`** - Application layer (e.g., `talker.lua` orchestrates event registration)
  - **`bin/lua/domain/`** - Core entities (`Character`, `Event`), repositories (`memory_store`, `event_store`, `personalities`, `backstories`), domain data tables (`domain/data/`), and domain services (`domain/service/`)
  - **`bin/lua/framework/`** - Utilities (logger, inspect, `utils.lua`) — no game dependencies
  - **`bin/lua/infra/`** - External integrations:
    - `HTTP/` - Network layer using pollnet FFI bindings
    - `zmq/` - ZeroMQ bridge for Python service communication; `zmq/serializer.lua` handles wire-format serialization
    - `STALKER/` - Game-specific data (factions, locations, world_state)
  - **`bin/lua/interface/`** - Bridge layer (`config.lua` reads MCM settings, `interface.lua` exposes public API)
  - **`gamedata/scripts/`** - Game callbacks (STALKER X-Ray engine integration):
    - `talker_game_*.script` - Game adapters (queries, commands, persistence, async)
    - `talker_trigger_*.script` - Event triggers (death, injury, artifact, etc.)
    - `talker_listener_*.script` - Event listeners that register events with the talker system
    - `talker_input_*.script` - Player input handlers (chatbox, microphone)
    - `talker_zmq_*.script` - ZMQ integration (query handlers, command handlers)
    - `talker_mcm.script` - MCM configuration UI

  **Critical Rule**: `bin/lua/` code must NEVER directly call STALKER game APIs - always go through `talker_game_*` adapters in `gamedata/scripts/`.

  ### Python Service (AI Processing)

  Located in `talker_service/`:

  - **`src/talker_service/`** - Main package
    - `llm/` - LLM client implementations (OpenAI, OpenRouter, Ollama, Proxy)
    - `prompts/` - Prompt building for dialogue, speaker selection, memory compression
    - `dialogue/` - Dialogue generator and speaker selector
    - `state/` - State query client for fetching game data
    - `transport/` - ZMQ router for bidirectional communication
    - `handlers/` - Event and config handlers
    - `models/` - Pydantic message schemas

  **Communication Flow:**
  ```
  Lua → ZMQ PUB (5555) → Python SUB
  Python → ZMQ PUB (5556) → Lua SUB
  ```

  ## Key Patterns & Conventions

  ### 1. Typed Event System (Core Workflow)

  Events flow: Game → Trigger → `trigger.talker_event_near_player()` → Listener → `talker.register_event()` → Event Store → ZMQ → Python → AI Dialogue → ZMQ → Lua → Display

  **Creating typed events** (preferred):
  ```lua
  local EventType = require("domain.model.event_types")
  local trigger = require("interface.trigger")

  -- In a trigger script:
  local context = { actor = player_character, victim = target_character }
  trigger.talker_event_near_player(EventType.DEATH, context, true, { is_silent = false })
  ```

  **Event structure** (typed):
  - `type` - EventType enum value (DEATH, DIALOGUE, ARTIFACT, etc.)
  - `context` - Table with event-specific fields (actor, victim, text, item_name, etc.)
  - `game_time_ms`, `world_context`, `witnesses`, `flags`

  **EventType enum** (see `bin/lua/domain/model/event_types.lua`):
  `DEATH`, `DIALOGUE`, `CALLOUT`, `TAUNT`, `ARTIFACT`, `ANOMALY`, `MAP_TRANSITION`, `EMISSION`, `INJURY`, `SLEEP`, `TASK`, `WEAPON_JAM`, `RELOAD`, `IDLE`, `ACTION`

  **Event templates** are defined in `bin/lua/domain/model/event.lua` TEMPLATES table - each EventType has a function that returns a format string and objects to interpolate.

  **Key functions**:
  - `Event.create(type, context, game_time_ms, world_context, witnesses, flags)` - Create typed event
  - `Event.describe(event)` - Convert any event (typed or legacy) to human-readable text
  - `Event.is_junk_event(event)` - Check if event is low-value for narrative (artifacts, anomalies, reloads, etc.)

  ### 2. Memory Architecture (Three-Tier System)

  - **Recent Events** (last ~12 events): Raw events stored in `event_store`
  - **Mid-Term Memory** (previous ~12 events): Auto-compressed summary
  - **Long-Term Memory** (persistent, max 7000 chars): Updated via LLM calls in `memory_store:update_narrative()`

  Memory compression triggers when event count exceeds `COMPRESSION_THRESHOLD` (12 events). See [bin/lua/domain/repo/memory_store.lua](../bin/lua/domain/repo/memory_store.lua).

  ### 3. ZMQ Communication Pattern (Phase 2+)

  AI processing is now handled by the Python service. Lua publishes events and receives commands:

  **Lua → Python (Events):**
  ```lua
  -- In talker_zmq_integration.script
  publisher.send_game_event(event, is_important)
  ```

  **Python → Lua (Commands):**
  ```lua
  -- In talker_zmq_command_handlers.script
  -- Handler for dialogue.display command
  local function handle_dialogue_display(payload)
      game.display_dialogue(payload.speaker_id, payload.dialogue)
  end
  ```

  **State Queries (Python → Lua → Python):**
  ```lua
  -- Python publishes state.query, Lua responds with state.response
  -- See talker_zmq_query_handlers.script for handlers
  ```

  ### 4. Error Handling

  All game callbacks MUST be wrapped in error handlers:

  ```lua
  local function safely(func, name)
      return function(...)
          local status, result = pcall(func, ...)
          if not status then log.error(name .. " failed: " .. result) end
          return result
      end
  end
  RegisterScriptCallback("actor_on_death", safely(on_death, "on_death"))
  ```

  ### 5. Package Path Management

  Every Lua file accessing `bin/lua/` modules must start with:
  ```lua
  package.path = package.path .. ";./bin/lua/?.lua;"
  ```

  ### 5a. Engine Facade (Required for all `bin/lua/` Code)

  `bin/lua/` modules **must never** access STALKER engine globals directly (`talker_mcm`, `talker_game_queries`, `talker_game_commands`, `talker_game_async`, `talker_game_files`, `ini_file`, `printf`, `CreateTimeEvent`, etc.). Always go through the engine facade:

  ```lua
  local engine = require("interface.engine")

  -- Read MCM config value (falls back to config_defaults if MCM not loaded)
  local val = engine.get_mcm_value("debug_logging")

  -- Game queries
  local name = engine.get_name(character)
  local alive = engine.is_alive(character)
  local player = engine.get_player()

  -- Game commands
  engine.display_message(speaker, message, time)
  engine.play_sound(character, sound_id)

  -- Async / time events
  engine.create_time_event("my_event", key, 0, handler)
  engine.register_callback("on_death", handler)
  ```

  **Forbidden** (never use in `bin/lua/`):
  ```lua
  talker_mcm.get("debug_logging")
  talker_game_queries.get_name(obj)
  talker_game_commands.display_message(...)
  ini_file("talker\\backstories.ltx")
  printf("message")
  CreateTimeEvent(...)
  ```

  This makes all `bin/lua/` modules **testable without a running game** — just inject `mock_engine`.

  ### 5b. Test Bootstrap Pattern (Required for all Lua tests)

  Every test file must begin with:
  ```lua
  package.path = package.path .. ';./bin/lua/?.lua;./bin/lua/*/?.lua'
  require("tests.test_bootstrap")  -- must be BEFORE any bin/lua require
  ```

  `test_bootstrap.lua` wires `mock_engine` automatically. Use `mock_engine._set(key, value)` to override MCM config or game query return values per test:
  ```lua
  local mock_engine = require("tests.mocks.mock_engine")

  function setUp()
      mock_engine._set("debug_logging", 3)             -- MCM key
      mock_engine._set("get_location_name", "Rostok")  -- game query
  end

  function tearDown()
      mock_engine._reset()  -- clear all overrides
  end
  ```

  ### 5c. Deterministic Tests

  `test_bootstrap.lua` calls `math.randomseed(42)` to make backstory/personality assignment deterministic. Do not use snapshot assertions (`assert_or_record`) for data containing randomly-assigned backstory or personality IDs — use structural assertions instead.

  ### 5d. Data Tables Over .ltx Files

  Backstory and personality data is stored as pure Lua tables, not parsed from .ltx:
  - `bin/lua/domain/repo/backstory_data.lua` — replaces `backstories.ltx`
  - `bin/lua/domain/repo/personality_data.lua` — replaces `personalities.ltx`

  These are the **source of truth** for tests. The `.ltx` files remain for the game engine loader but are not used at runtime by `bin/lua/` code.

  ### 6. Configuration Access

  Always use getters from `interface.config`, never access MCM directly from `bin/lua/`:
  ```lua
  local config = require("interface.config")
  local cooldown = config.idle_conversation_cooldown() * 1000 -- ms
  ```

  ## Testing

  ### Lua Tests

  **IMPORTANT**: Always use the `lua-tests` MCP server tools to run Lua tests — do NOT call `lua5.1` directly in the terminal.

  Available MCP tools (`lua-tests` server):
  - `list_tests` — discover all `test_*.lua` files (optionally filter by `path`)
  - `run_tests` — run tests by path/pattern; accepts `path`, `pattern`, `fail_fast`, `include_live`
  - `run_single_test` — run one test file with full output (`file` parameter)
  - `get_last_run_results` — read results from the most recent run

  Examples:
  - All tests: `run_tests {}` (no args)
  - By subdirectory: `run_tests { path: "tests/domain/" }`
  - By pattern: `run_tests { pattern: "serializer" }`
  - Single file: `run_single_test { file: "tests/domain/data/test_mutant_names.lua" }`
  - List tests: `list_tests { path: "tests/domain/" }`

  **Manual fallback** (if MCP unavailable): `lua5.1.exe tests/<path>/test_<module>.lua`
  - Note: Use `lua5.1.exe`, not `lua` (which may not be in PATH)
  - Test structure mirrors source: `tests/domain/`, `tests/infra/`, `tests/entities/`, etc.
  - Use mocks from `tests/mocks/` (mock_characters, mock_game_adapter, mock_REST)
  - Live integration tests in `tests/live/` (require actual LLM API keys; excluded by default from MCP tools)

  ### Python Tests (talker_service)

  - **IMPORTANT**: Always use MCP tools to run Python tests — do NOT call `python`, `pytest`, or `.venv` directly in the terminal.

  ### OpenSpec CLI

  - **IMPORTANT**: Use the globally installed `openspec` CLI command directly (e.g., `openspec status`, `openspec list --json`). Do NOT try to run it via `python -m openspec` or through a venv — it is a global npm/system install.
  - Use the `run_tests` MCP tool with an optional `path` argument:
    - All tests: omit `path`
    - Unit tests (top-level): `path: "tests/"` with a `pattern` filter
    - Integration tests: `path: "tests/integration/"`
    - E2E tests: `path: "tests/e2e/"`
  - Use `run_single_test` to run a specific test by node ID
  - Use `list_tests` to discover available tests before running
  - Use `get_last_run_results` to inspect results from the previous run
  - Test files: `tests/test_*.py` (pytest, ~130 tests)
  - Coverage includes: LLM clients, prompts, dialogue generation, ZMQ router, state client

